<style>

<body class="bg-background text-on-background min-h-screen flex flex-col items-center overflow-x-hidden">
<!-- Top Navigation Area -->
<header class="w-full max-w-[1280px] flex justify-between items-center px-margin-mobile md:px-margin-desktop py-4 h-16">
<div class="flex items-center">
<img alt="CanGo Logo" class="h-8 w-auto" src="https://lh3.googleusercontent.com/aida-public/AB6AXuD31-UOXecPfsRAm-JvoqlnA9iZ7Hk97Fryse3mkkZKKAiKuiNEOiCbEr12Iqf1vdiW36l9Mw2Llvee2oy349RXhTGY21GBoZiQbDQCwmPkjVWcjESa0U7lY_8iqi0-i0IJUVd6SRK58yPV3RTTyew6agSTQV77zsfKzWqAKTGtqYzwwdy6-ys1-OX4nvxXm32tvuFZ6YZ6zvxLXMvQb1ZxEGsWjSeSihAa-ZivfzMevw0Es-ai8VnLDP51O8uPyWBxF53_rS1i3w"/>
</div>
<button class="text-on-surface-variant hover:text-primary transition-colors font-medium text-sm">
            Skip
        </button>
</header>
<!-- Main Content Canvas -->
<main class="flex-grow w-full max-w-[640px] px-margin-mobile md:px-margin-desktop py-12 flex flex-col">
<!-- Header Section -->
<div class="mb-12">
<div class="w-12 h-1 bg-surface-container rounded-full mb-6">
<div class="w-3/4 h-full bg-primary rounded-full transition-all duration-500"></div>
</div>
<h1 class="font-headline-md text-headline-md text-on-surface mb-2">
                What are your goals in Germany?
            </h1>
<p class="font-body-md text-body-md text-on-surface-variant">
                Select all that apply to personalize your learning journey.
            </p>
</div>
<!-- Goals Selection Grid -->
<div class="grid grid-cols-1 gap-4 select-none" id="goals-container">
<!-- Goal Item: Study -->
<div class="goal-card group relative flex items-center p-6 bg-surface-container-lowest border border-outline-variant rounded-xl cursor-pointer hover:border-primary transition-all duration-200 active:scale-[0.98] goal-card-active" onclick="toggleGoal(this)">
<div class="icon-container flex items-center justify-center w-12 h-12 rounded-lg bg-surface-container text-on-surface-variant group-hover:text-primary transition-colors">
<span class="material-symbols-outlined text-3xl">school</span>
</div>
<div class="ml-4 flex-grow">
<span class="font-body-lg text-body-lg text-on-surface block">Study</span>
</div>
<div class="check-icon flex absolute right-6 text-primary">
<span class="material-symbols-outlined" style="font-variation-settings: 'FILL' 1;">check_circle</span>
</div>
</div>
<!-- Goal Item: Work -->
<div class="goal-card group relative flex items-center p-6 bg-surface-container-lowest border border-outline-variant rounded-xl cursor-pointer hover:border-primary transition-all duration-200 active:scale-[0.98] goal-card-active" onclick="toggleGoal(this)">
<div class="icon-container flex items-center justify-center w-12 h-12 rounded-lg bg-surface-container text-on-surface-variant group-hover:text-primary transition-colors">
<span class="material-symbols-outlined text-3xl">work</span>
</div>
<div class="ml-4 flex-grow">
<span class="font-body-lg text-body-lg text-on-surface block">Work</span>
</div>
<div class="check-icon flex absolute right-6 text-primary">
<span class="material-symbols-outlined" style="font-variation-settings: 'FILL' 1;">check_circle</span>
</div>
</div>
<!-- Goal Item: Daily Life -->
<div class="goal-card group relative flex items-center p-6 bg-surface-container-lowest border border-outline-variant rounded-xl cursor-pointer hover:border-primary transition-all duration-200 active:scale-[0.98] goal-card-active" onclick="toggleGoal(this)">
<div class="icon-container flex items-center justify-center w-12 h-12 rounded-lg bg-surface-container text-on-surface-variant group-hover:text-primary transition-colors">
<span class="material-symbols-outlined text-3xl">shopping_cart</span>
</div>
<div class="ml-4 flex-grow">
<span class="font-body-lg text-body-lg text-on-surface block">Daily Life</span>
</div>
<div class="check-icon flex absolute right-6 text-primary">
<span class="material-symbols-outlined" style="font-variation-settings: 'FILL' 1;">check_circle</span>
</div>
</div>
<!-- Goal Item: Making Friends -->
<div class="goal-card group relative flex items-center p-6 bg-surface-container-lowest border border-outline-variant rounded-xl cursor-pointer hover:border-primary transition-all duration-200 active:scale-[0.98] goal-card-active" onclick="toggleGoal(this)">
<div class="icon-container flex items-center justify-center w-12 h-12 rounded-lg bg-surface-container text-on-surface-variant group-hover:text-primary transition-colors">
<span class="material-symbols-outlined text-3xl">groups</span>
</div>
<div class="ml-4 flex-grow">
<span class="font-body-lg text-body-lg text-on-surface block">Making Friends</span>
</div>
<div class="check-icon flex absolute right-6 text-primary">
<span class="material-symbols-outlined" style="font-variation-settings: 'FILL' 1;">check_circle</span>
</div>
</div>

<div class="goal-card group relative flex items-center p-6 bg-surface-container-lowest border border-outline-variant rounded-xl cursor-pointer hover:border-primary transition-all duration-200 active:scale-[0.98] goal-card-active" onclick="toggleGoal(this)">
<div class="icon-container flex items-center justify-center w-12 h-12 rounded-lg bg-surface-container text-on-surface-variant group-hover:text-primary transition-colors">
<span class="material-symbols-outlined text-3xl">train</span>
</div>
<div class="ml-4 flex-grow">
<span class="font-body-lg text-body-lg text-on-surface block">Travel</span>
</div>
<div class="check-icon flex absolute right-6 text-primary">
<span class="material-symbols-outlined" style="font-variation-settings: 'FILL' 1;">check_circle</span>
</div>
</div>
</div>
<!-- Footer Action Area -->
<div class="mt-auto pt-12 sticky bottom-0 bg-background/80 backdrop-blur-md pb-8">
<button class="w-full h-14 bg-primary text-on-primary font-semibold text-base rounded-xl shadow-lg hover:bg-primary-container transition-all duration-200 disabled:opacity-30 disabled:cursor-not-allowed flex items-center justify-center gap-2 group" id="continue-btn">
                Continue
                <span class="material-symbols-outlined text-lg group-hover:translate-x-1 transition-transform">arrow_forward</span>
</button>
<p class="text-center mt-4 text-on-surface-variant font-label-sm text-label-sm">
                You can change these settings later in your profile.
            </p>
</div>
</main>
<!-- Interactive Layer -->
<script>
        // Initial state: all selected as per defaults in HTML
        const selectedGoals = new Set(['Study', 'Work', 'Daily Life', 'Making Friends', 'Travel']);
        const continueBtn = document.getElementById('continue-btn');

        function toggleGoal(element) {
            const label = element.querySelector('.text-on-surface').innerText;
            const checkIcon = element.querySelector('.check-icon');
            
            if (selectedGoals.has(label)) {
                selectedGoals.delete(label);
                element.classList.remove('goal-card-active');
                checkIcon.classList.add('hidden');
                checkIcon.classList.remove('flex');
            } else {
                selectedGoals.add(label);
                element.classList.add('goal-card-active');
                checkIcon.classList.remove('hidden');
                checkIcon.classList.add('flex');
            }

            // Update Continue Button State
            if (selectedGoals.size > 0) {
                continueBtn.removeAttribute('disabled');
                continueBtn.classList.remove('opacity-30');
            } else {
                continueBtn.setAttribute('disabled', 'true');
                continueBtn.classList.add('opacity-30');
            }

            if (window.navigator && window.navigator.vibrate) {
                window.navigator.vibrate(5);
            }
        }

        // Simple enter animation for list items
        document.querySelectorAll('#goals-container > div').forEach((el, index) => {
            el.style.opacity = '0';
            el.style.transform = 'translateY(10px)';
            setTimeout(() => {
                el.style.transition = 'opacity 0.4s ease, transform 0.4s ease';
                el.style.opacity = '1';
                el.style.transform = 'translateY(0)';
            }, 100 * index);
        });
    </script>
