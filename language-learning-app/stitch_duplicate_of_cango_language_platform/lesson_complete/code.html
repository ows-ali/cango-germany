<script>
        // Micro-interaction for progress ring
        window.addEventListener('DOMContentLoaded', () => {
            const circle = document.querySelector('.progress-ring__circle');
            if (circle) {
                const radius = circle.r.baseVal.value;
                const circumference = radius * 2 * Math.PI;
                circle.style.strokeDasharray = `${circumference} ${circumference}`;
                
                // Set initial offset for 0%
                circle.style.strokeDashoffset = circumference;
                
                // Animate to 75%
                setTimeout(() => {
                    const offset = circumference - (75 / 100 * circumference);
                    circle.style.strokeDashoffset = offset;
                }, 400);
            }
        });

        // Hover lift effect for cards
        document.querySelectorAll('.bg-surface-container-lowest').forEach(card => {
            card.addEventListener('mouseenter', () => {
                card.style.borderColor = 'rgba(9, 20, 38, 0.2)';
            });
            card.addEventListener('mouseleave', () => {
                card.style.borderColor = 'rgba(197, 198, 205, 0.3)';
            });
        });
    </script>
